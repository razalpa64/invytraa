<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>INVYTRA | Luxury Digital Wedding Invitations</title>
    <meta name="description" content="INVYTRA crafts bespoke luxury digital wedding invitations with cinematic animations, RSVP forms, and elegant designs. Order via WhatsApp. Fast delivery in 3-5 days." />
    <meta name="keywords" content="digital wedding invitation, luxury wedding invitation, online wedding card, digital nikah invitation, bespoke invitation website, animated wedding invitation, INVYTRA" />
    <meta name="author" content="INVYTRA" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://invytra.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://invytra.com/" />
    <meta property="og:title" content="INVYTRA | Luxury Digital Wedding Invitations" />
    <meta property="og:description" content="Bespoke digital invitations with cinematic animations. Your guests will be captivated before the celebration begins." />
    <meta property="og:image" content="https://invytra.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="INVYTRA" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@invytra" />
    <meta name="twitter:title" content="INVYTRA | Luxury Digital Wedding Invitations" />
    <meta name="twitter:description" content="Bespoke digital invitations with cinematic animations. Order via WhatsApp. Delivered in 3-5 days." />
    <meta name="twitter:image" content="https://invytra.com/og-image.jpg" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.pexels.com" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- Structured Data — Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "INVYTRA",
      "url": "https://invytra.com",
      "logo": "https://invytra.com/logo.png",
      "description": "Luxury digital wedding invitation agency crafting bespoke cinematic invitation websites.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["English", "Hindi"],
        "contactOption": "TollFree"
      },
      "sameAs": [
        "https://instagram.com/invytra"
      ]
    }
    </script>

    <!-- Structured Data — WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "INVYTRA",
      "url": "https://invytra.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://invytra.com/#templates?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body class="bg-ivory text-charcoal font-sans antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
