<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>INVYTRA | Luxury Digital Wedding Invitations</title>
    <meta name="description" content="INVYTRA crafts bespoke luxury digital wedding invitations with cinematic animations, RSVP forms, and elegant designs. Order via WhatsApp. Fast delivery in 3-5 days." />

    <meta name="author" content="INVYTRA" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://invytra.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://invytra.com/" />
    <meta property="og:title" content="INVYTRA | Luxury Digital Wedding Invitations" />
    <meta property="og:description" content="Bespoke digital invitations with cinematic animations. Your guests will be captivated before the celebration begins." />
    <meta property="og:image" content="https://invytra.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="INVYTRA" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@invytra" />
    <meta name="twitter:title" content="INVYTRA | Luxury Digital Wedding Invitations" />
    <meta name="twitter:description" content="Bespoke digital invitations with cinematic animations. Order via WhatsApp. Delivered in 3-5 days." />
    <meta name="twitter:image" content="https://invytra.com/og-image.jpg" />
